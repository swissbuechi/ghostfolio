name: Track upstream tag, rebase patches, build

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

env:
  UPSTREAM: https://github.com/ghostfolio/ghostfolio.git

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get latest upstream tag
        id: tag
        run: |
          git remote add upstream "$UPSTREAM"
          git fetch upstream --tags
          LATEST=$(git ls-remote --tags --refs upstream \
            | awk -F/ '{print $NF}' | sort -V | tail -n1)
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Skip if image already built
        id: check
        run: |
          if docker manifest inspect \
             ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.latest }} >/dev/null 2>&1; then
            echo "build=false" >> "$GITHUB_OUTPUT"
          else
            echo "build=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Rebase customizations onto new tag
        if: steps.check.outputs.build == 'true'
        run: |
          git config user.name  "fork-bot"
          git config user.email "fork-bot@users.noreply.github.com"
          git checkout staging
          git rebase --onto "${{ steps.tag.outputs.latest }}" \
            $(git merge-base staging "${{ steps.tag.outputs.latest }}") staging
          git push --force-with-lease origin staging

      - name: Log in to GHCR
        if: steps.check.outputs.build == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        if: steps.check.outputs.build == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.tag.outputs.latest }}
            ghcr.io/${{ github.repository }}:latest
